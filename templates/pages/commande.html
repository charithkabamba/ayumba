{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- Page Header -->
<div class="page-header">
    <div class="container">
        <h1 class="display-3 fw-bold mb-3" data-aos="zoom-in">Passer une Commande</h1>
        <p class="lead opacity-75" data-aos="fade-up" data-aos-delay="100">Remplissez le formulaire ci-dessous, notre
            équipe s'occupe du reste.</p>
    </div>
</div>

<!-- Order Form Section -->
<section>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card" data-aos="fade-up">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold text-primary">Détails de votre demande</h2>
                        <p class="text-muted">Les champs marqués d'un <span class="text-danger">*</span> sont
                            obligatoires.</p>
                    </div>

                    <form action="#" method="POST" id="orderForm">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="nom" class="form-label fw-bold small text-uppercase">Nom Complet <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="nom" placeholder="Votre nom" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="telephone" class="form-label fw-bold small text-uppercase">Numéro de
                                    Téléphone <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-whatsapp"></i></span>
                                    <input type="tel" class="form-control" id="telephone" placeholder="+243 XXX XXX XXX"
                                        required>
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="email" class="form-label fw-bold small text-uppercase">Adresse E-mail
                                    (facultatif)</label>
                                <input type="email" class="form-control" id="email" placeholder="exemple@mail.com">
                            </div>
                            <div class="col-12">
                                <label for="service" class="form-label fw-bold small text-uppercase">Service Souhaité
                                    <span class="text-danger">*</span></label>
                                <select class="form-select" id="service" required>
                                    <option value="" selected disabled>Choisissez un service...</option>
                                    <option value="credits">Crédits Téléphoniques</option>
                                    <option value="internet">Forfaits Internet</option>
                                    <option value="mobile_money">Mobile Money (Dépôt/Retrait)</option>
                                    <option value="change">Bureau de Change</option>
                                    <option value="tv">Abonnement TV (Canal+/DSTV)</option>
                                    <option value="autre">Autre Demande Spécifique</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="details" class="form-label fw-bold small text-uppercase">Détails de la
                                    commande <span class="text-danger">*</span></label>
                                <textarea class="form-control" id="details" rows="5"
                                    placeholder="Montant, opérateur, numéro bénéficiaire, etc..." required></textarea>
                                <div class="form-text text-muted">Exemple : Airtel, 5000 CDF sur le 0970000000</div>
                            </div>

                            <div class="col-12 mt-5">
                                <button type="submit" class="btn btn-premium btn-premium-primary w-100 py-3 fs-5">
                                    <i class="bi bi-send-fill me-2"></i> Envoyer ma Commande
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
